namespace: skillpulse-staging

resources:
  - ../base

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Service
      name: frontend
    patch: |-
      - op: replace
        path: /spec/ports/0/nodePort
        value: 30082
