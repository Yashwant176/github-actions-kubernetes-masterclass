namespace: skillpulse-prod

resources:
  - ../base

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Service
      name: frontend
    patch: |-
      - op: replace
        path: /spec/ports/0/nodePort
        value: 30083
