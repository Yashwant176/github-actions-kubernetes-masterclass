name: CD (Kustomize - manifest bump)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  bump-manifests:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set SHA
        run: echo "SHA=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

      - name: Install Kustomize
        run: |
          KUSTOMIZE_VERSION=v5.4.2
          curl -sLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Update dev manifests
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          cd k8s/dev

          kustomize edit set image backend=${DOCKER_USER}/skillpulse-backend:${SHA}
          kustomize edit set image frontend=${DOCKER_USER}/skillpulse-frontend:${SHA}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/dev/kustomization.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update dev images to ${SHA:0:7}"
          git push
