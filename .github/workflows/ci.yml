name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # BUILD 
      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          load: true
          tags: skillpulse-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          load: true
          tags: skillpulse-frontend:ci

      # SECURITY SCAN
      - name: Trivy scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: skillpulse-backend:ci
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: skillpulse-frontend:ci
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # DOCKER HUB LOGIN 
      - name: Login DockerHub
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # PUSH IMAGES 
      - name: Push backend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}

      - name: Push frontend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
