name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login DockerHub
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # BUILD + LOAD (only once)
      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          load: true
          tags: skillpulse-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          load: true
          tags: skillpulse-frontend:ci

      # INSTALL TRIVY (stable method)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

          trivy --version

      # SCAN BACKEND
      - name: Trivy scan backend
        run: trivy image --exit-code 0 --severity HIGH,CRITICAL skillpulse-backend:ci

      # SCAN FRONTEND
      - name: Trivy scan frontend
        run: trivy image --exit-code 0 --severity HIGH,CRITICAL skillpulse-frontend:ci

      # PUSH BACKEND
      - name: Push backend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}

      # PUSH FRONTEND
      - name: Push frontend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
