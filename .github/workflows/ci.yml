name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login DockerHub
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          load: true
          tags: skillpulse-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          load: true
          tags: skillpulse-frontend:ci

      - name: Install Trivy (fixed)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

          TRIVY_VERSION=0.52.2

          wget -q https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz
          tar zxvf trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz

          sudo mv trivy /usr/local/bin/
          trivy --version

      - name: Trivy scan backend
        run: trivy image --exit-code 0 --severity HIGH,CRITICAL skillpulse-backend:ci

      - name: Trivy scan frontend
        run: trivy image --exit-code 0 --severity HIGH,CRITICAL skillpulse-frontend:ci

      - name: Push backend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}

      - name: Push frontend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
