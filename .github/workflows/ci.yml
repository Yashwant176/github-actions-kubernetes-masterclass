name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  build-and-security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================
      # BUILD BACKEND
      # =========================

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          load: true
          push: false
          tags: skillpulse-backend:latest

      # =========================
      # BUILD FRONTEND
      # =========================

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          load: true
          push: false
          tags: skillpulse-frontend:latest

      # =========================
      # TRIVY BACKEND SCAN
      # =========================

      - name: Run Trivy scan on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'skillpulse-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      # =========================
      # TRIVY FRONTEND SCAN
      # =========================

      - name: Run Trivy scan on frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'skillpulse-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      # =========================
      # GENERATE REPORTS
      # =========================

      - name: Generate backend report
        run: |
          mkdir -p security-reports
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD/security-reports:/reports \
            aquasec/trivy image \
            -f json \
            -o /reports/backend-report.json \
            skillpulse-backend:latest

      - name: Generate frontend report
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD/security-reports:/reports \
            aquasec/trivy image \
            -f json \
            -o /reports/frontend-report.json \
            skillpulse-frontend:latest

      # =========================
      # UPLOAD REPORTS
      # =========================

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-reports
          path: security-reports/

      # =========================
      # PUSH IMAGES
      # =========================

      - name: Push backend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}

      - name: Push frontend image
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
